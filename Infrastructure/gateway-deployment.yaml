apiVersion: apps/v1
kind: Deployment
metadata:
  name: fleet-gateway-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fleet-gateway
  template:
    metadata:
      labels:
        app: fleet-gateway
    spec:
      containers:
        - name: gateway
          image: fleet-gateway:latest
          imagePullPolicy: Never  # Dynamic Lock: Crucial for reading the local registry image
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: fleet-gateway-service
spec:
  selector:
    app: fleet-gateway
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fleet-gateway-ingress
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
    - host: api.fleet.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: fleet-gateway-service
                port:
                  number: 80